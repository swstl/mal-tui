name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      update_release:
        description: 'Add artifacts to the current release and update apt repo + Docker'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from Cargo.toml
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
            deb_arch: arm64
          - target: armv7-unknown-linux-gnueabihf
            suffix: linux-armv7
            deb_arch: armhf
          - target: i686-unknown-linux-gnu
            suffix: linux-i686
            deb_arch: i386
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          VERSION=${{ needs.setup.outputs.version }}
          DEB_ARCH=${{ matrix.deb_arch }}
          cp target/${{ matrix.target }}/release/mal-tui mal-tui-${{ matrix.suffix }}
          sudo apt-get install -y dpkg-dev
          mkdir -p deb-pkg/usr/bin deb-pkg/DEBIAN
          cp mal-tui-${{ matrix.suffix }} deb-pkg/usr/bin/mal-tui
          chmod +x deb-pkg/usr/bin/mal-tui
          printf 'Package: mal-tui\nVersion: %s\nArchitecture: %s\nMaintainer: swstl <swstl@hotmail.com>\nDescription: A terminal client for MyAnimeList\n' "$VERSION" "$DEB_ARCH" > deb-pkg/DEBIAN/control
          dpkg-deb --build --root-owner-group deb-pkg mal-tui_${VERSION}_${DEB_ARCH}.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: |
            mal-tui-${{ matrix.suffix }}
            mal-tui_*.deb

  release:
    needs: [setup, build]
    if: github.event_name == 'push' || inputs.update_release == true
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update apt repo
        run: |
          sudo apt-get install -y dpkg-dev
          cd server/apt
          for arch in amd64 arm64 armhf i386; do
            mkdir -p pool/${arch} dists/stable/main/binary-${arch}
            find $GITHUB_WORKSPACE/artifacts -name "*_${arch}.deb" -exec cp {} pool/${arch}/ \;
            dpkg-scanpackages pool/${arch} > dists/stable/main/binary-${arch}/Packages
            gzip -k -f dists/stable/main/binary-${arch}/Packages
          done
          printf 'Origin: mal-tui\nLabel: mal-tui\nSuite: stable\nCodename: stable\nArchitectures: amd64 arm64 armhf i386\nComponents: main\nDescription: mal-tui apt repository\n' > dists/stable/Release

      - name: Sign apt repo
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cd server/apt
          gpg --batch --yes --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --armor --detach-sign -o dists/stable/Release.gpg dists/stable/Release

      - name: Create or update release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: v${{ needs.setup.outputs.version }}
          files: |
            artifacts/linux-x86_64/mal-tui-linux-x86_64
            artifacts/linux-aarch64/mal-tui-linux-aarch64
            artifacts/linux-armv7/mal-tui-linux-armv7
            artifacts/linux-i686/mal-tui-linux-i686
            artifacts/**/*.deb

      - name: Commit apt repo changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add server/apt/
          git commit -m "update apt repo to v${{ needs.setup.outputs.version }}"
          git push

  update-aur:
    needs: [setup, release]
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          echo -e "Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur" >> ~/.ssh/config

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/mal-tui.git

      - name: Update PKGBUILD
        run: |
          cd mal-tui
          VERSION=${{ needs.setup.outputs.version }}
          URL="https://github.com/swstl/mal-cli/releases/download/v$VERSION/mal-tui-linux-x86_64"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('$SHA256')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v ${{ github.workspace }}/mal-tui:/pkg archlinux bash -c "
            pacman -Sy --noconfirm base-devel &&
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            su - builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
          "
          sudo chown -R $USER:$USER ${{ github.workspace }}/mal-tui

      - name: Commit and push to AUR
        run: |
          cd mal-tui
          git config user.name "Dogfetus"
          git config user.email "dogfetus@hotmail.com"
          git add PKGBUILD .SRCINFO
          git commit -m "update to v${{ needs.setup.outputs.version }}"
          git push
